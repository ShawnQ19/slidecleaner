name: Build iOS

on:
  push:
    branches: [ master ]
    paths:
      - 'ios/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'ios/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build iOS App
        run: |
          xcodebuild build \
            -project ios/GalleryCleaner.xcodeproj \
            -scheme GalleryCleaner \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -configuration Debug \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalleryCleaner-iOS
          path: ios/build/Build/Products/Debug-iphonesimulator/GalleryCleaner.app
          retention-days: 7
