name: Build iOS Device

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build for Device
        run: |
          xcodebuild build \
            -project ios/GalleryCleaner.xcodeproj \
            -scheme GalleryCleaner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p ios/ipa/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/GalleryCleaner.app ios/ipa/Payload/
          cd ios/ipa
          zip -r ../GalleryCleaner-device.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GalleryCleaner-iOS-Device
          path: ios/GalleryCleaner-device.ipa
          retention-days: 7
